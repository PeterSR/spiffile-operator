name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: spiffile-operator
      # Until the spiffile library is published, go.mod resolves it via a
      # local `replace ../spiffile/go` — provide the sibling checkout.
      # Remove this step (and the replace directive) after publishing.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository_owner }}/spiffile
          path: spiffile
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: spiffile-operator/go.mod
          cache-dependency-path: spiffile-operator/go.sum
          check-latest: true
      - working-directory: spiffile-operator
        run: test -z "$(gofmt -l .)"
      - working-directory: spiffile-operator
        run: go vet ./...
      - working-directory: spiffile-operator
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: spiffile-operator
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository_owner }}/spiffile
          path: spiffile
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: spiffile-operator/go.mod
          cache-dependency-path: spiffile-operator/go.sum
          check-latest: true
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          working-directory: spiffile-operator

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: spiffile-operator
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository_owner }}/spiffile
          path: spiffile
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: spiffile-operator/go.mod
          cache-dependency-path: spiffile-operator/go.sum
          check-latest: true
      - working-directory: spiffile-operator
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - run: helm lint charts/spiffile-operator
      - run: helm template test charts/spiffile-operator --set webhook.enabled=true >/dev/null
      # The chart ships the same CRDs as the raw manifests — keep them identical.
      - run: diff -u deploy/crd.yaml charts/spiffile-operator/crds/crds.yaml

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: shellcheck scripts/kubectl-spiffile
