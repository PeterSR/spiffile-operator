# Tag-driven release — nothing publishes until a vX.Y.Z tag is pushed
# deliberately. Publishes to GHCR (no extra secrets: GITHUB_TOKEN + OIDC):
#
#   image: ghcr.io/petersr/spiffile-operator:X.Y.Z (+ latest), amd64+arm64,
#          keyless-signed with cosign, with SLSA provenance + SBOM attached
#   chart: oci://ghcr.io/petersr/charts/spiffile-operator:X.Y.Z
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# GHCR image names must be lowercase; hardcode rather than derive from
# ${{ github.repository }}, whose owner casing is mixed.
env:
  IMAGE: ghcr.io/petersr/spiffile-operator

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - run: cosign sign --yes "${IMAGE}@${DIGEST}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

  chart:
    runs-on: ubuntu-latest
    # The chart references the image by tag; publishing it first opens a
    # window where Artifact Hub's security scanner finds no image and the
    # package shows a scanning error. Image first, then chart.
    needs: [image]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - run: |
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          helm package charts/spiffile-operator \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}
          helm push spiffile-operator-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/petersr/charts

  github-release:
    runs-on: ubuntu-latest
    needs: [image, chart]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
