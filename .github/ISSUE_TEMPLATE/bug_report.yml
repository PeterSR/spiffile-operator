name: Bug report
description: Something doesn't work as documented
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Operator version
      placeholder: v0.1.0 / image tag / commit
    validations:
      required: true
  - type: input
    id: kubernetes
    attributes:
      label: Kubernetes version
      placeholder: "1.32 (kind / EKS / ...)"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - Helm chart
        - Raw manifests (deploy/)
        - Other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: resources
    attributes:
      label: Relevant resources
      description: >
        The ServiceIdentity / ServiceIdentityClaim involved (including
        status), and pod annotations if the webhook is involved. Redact
        anything sensitive — never paste private keys or Secret data.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Operator logs
      render: text
