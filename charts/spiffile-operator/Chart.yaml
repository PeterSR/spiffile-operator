apiVersion: v2
name: spiffile-operator
description: Kubernetes operator for the spiffile profile — SPIFFE identities delivered as files
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://github.com/PeterSR/spiffile-operator
sources:
  - https://github.com/PeterSR/spiffile-operator
maintainers:
  - name: Peter Severin Rasmussen
    url: https://github.com/PeterSR
keywords:
  - spiffe
  - workload-identity
  - zero-trust
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: security
  artifacthub.io/crds: |
    - kind: ServiceIdentity
      version: v1alpha1
      name: serviceidentities.spiffile.io
      displayName: ServiceIdentity
      description: Declares a workload identity; the operator generates its keypair Secret and trust bundle.
    - kind: ServiceIdentityClaim
      version: v1alpha1
      name: serviceidentityclaims.spiffile.io
      displayName: ServiceIdentityClaim
      description: Binds an externally provisioned identity into a namespace (replica mode).
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/PeterSR/spiffile-operator#readme
    - name: spiffile profile
      url: https://github.com/PeterSR/spiffile
