apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "spiffile-operator.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "spiffile-operator.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "spiffile-operator.name" . }}
  labels: {{- include "spiffile-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["spiffile.io"]
    resources: ["serviceidentities", "serviceidentityclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["spiffile.io"]
    resources: ["serviceidentities/status", "serviceidentityclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "spiffile-operator.name" . }}
  labels: {{- include "spiffile-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "spiffile-operator.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "spiffile-operator.name" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "spiffile-operator.name" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels: {{- include "spiffile-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "spiffile-operator.name" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels: {{- include "spiffile-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "spiffile-operator.name" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "spiffile-operator.name" . }}
    namespace: {{ .Release.Namespace }}
