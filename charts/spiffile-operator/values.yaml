image:
  repository: ghcr.io/petersr/spiffile-operator
  tag: "" # defaults to appVersion
  pullPolicy: IfNotPresent

# Pod injection webhook. Requires cert-manager when enabled.
# Injection applies in namespaces labeled spiffile.io/injection: enabled;
# pods opt in via the spiffile.io/identity or spiffile.io/inject annotation.
webhook:
  enabled: false
  # Admission failure policy when the webhook is unreachable:
  #   Fail   - block pod creation in selected namespaces (default, fail-closed)
  #   Ignore - admit pods un-injected (favors availability over guaranteed injection)
  failurePolicy: Fail

replicas: 1

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
