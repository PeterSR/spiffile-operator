apiVersion: v1
kind: Namespace
metadata:
  name: spiffile-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spiffile-operator
  namespace: spiffile-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spiffile-operator
rules:
  - apiGroups: ["spiffile.io"]
    resources: ["serviceidentities", "serviceidentityclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["spiffile.io"]
    resources: ["serviceidentities/status", "serviceidentityclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spiffile-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spiffile-operator
subjects:
  - kind: ServiceAccount
    name: spiffile-operator
    namespace: spiffile-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spiffile-operator-leader-election
  namespace: spiffile-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spiffile-operator-leader-election
  namespace: spiffile-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spiffile-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: spiffile-operator
    namespace: spiffile-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spiffile-operator
  namespace: spiffile-system
  labels:
    app.kubernetes.io/name: spiffile-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spiffile-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spiffile-operator
    spec:
      serviceAccountName: spiffile-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: operator
          image: ghcr.io/petersr/spiffile-operator:latest # set your image
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Uncomment to enable the pod-injection webhook (also apply
            # deploy/webhook.yaml, which provides the cert-manager serving cert).
            # - name: WEBHOOK_ENABLED
            #   value: "true"
          ports:
            - name: webhook
              containerPort: 9443
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            # Serving cert for the optional pod-injection webhook, provided by
            # deploy/webhook.yaml. Enable the webhook with WEBHOOK_ENABLED above.
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: spiffile-webhook-server-cert
            optional: true
